<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HP Inc × Launch — Deck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111113;
      color: #ffffff;
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
    }

    .brand-logo {
      font-weight: 700;
      color: #ffffff;
    }

    .brand-divider {
      color: #1E5AF2;
    }

    .brand-sub {
      color: rgba(255,255,255,0.4);
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1E5AF2;
      color: #ffffff;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.6rem 1.25rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }

    .download-btn:hover {
      background: #1649d4;
    }

    .download-btn svg {
      width: 16px;
      height: 16px;
    }

    .deck-container {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .deck-meta {
      width: 100%;
      max-width: 900px;
    }

    .deck-meta h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .deck-meta p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    .deck-embed {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(255,255,255,0.1);
      background: #000;
    }

    .deck-embed iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .action-row {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .action-row p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }

    footer {
      padding: 1.5rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="brand">
      <span class="brand-logo">Launch</span>
      <span class="brand-divider">|</span>
      <span class="brand-sub">NTT DATA</span>
    </div>
    <a href="/hpi-deck.pdf" download="HP_Inc_x_Launch.pdf" class="download-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      Download PDF
    </a>
  </header>

  <div class="deck-container">
    <div class="deck-meta">
      <h1>HP Inc × Launch</h1>
      <p>Confidential — prepared for HP Inc by Launch by NTT DATA</p>
    </div>

    <div class="deck-embed">
      <iframe
        src="/"
        title="HP Inc × Launch deck"
        allowfullscreen
      ></iframe>
    </div>

    <div class="action-row">
      <p>Use arrow keys to navigate the embedded deck, or download the PDF above.</p>
      <a href="/hpi-deck.pdf" download="HP_Inc_x_Launch.pdf" class="download-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Download PDF
      </a>
    </div>
  </div>

  <footer>
    Launch by NTT DATA — Confidential
  </footer>

</body>
</html>
