<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XLA by Design · Digital Workplace Services · Launch by NTT DATA</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="XLA by Design — Experience designed to the metric that moves the outcome. An offering from Launch by NTT DATA.">
<meta property="og:title" content="XLA by Design · Launch by NTT DATA">
<meta property="og:description" content="Experience designed to the metric that moves the outcome. Part of the Digital Workplace Services experience model.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tamdanierlaunch-artifacts.xyz/xladesignxlaunch/">
<style>
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:#111113}
  iframe{display:block;width:100vw;height:100vh;border:0}
</style>
</head>
<body>
<iframe id="deck"
  src="/decks/xla-by-design-customer/"
  title="XLA by Design"
  allow="fullscreen; clipboard-write"
  allowfullscreen></iframe>
<script>
  // Keep keyboard focus on the deck so arrow keys / F / PageUp etc. reach
  // its handlers. Without this, focus sits on the parent and key events
  // never enter the iframe.
  const ifr = document.getElementById('deck');
  function focusDeck(){ try{ ifr.contentWindow.focus(); }catch(e){} }
  ifr.addEventListener('load', focusDeck);
  window.addEventListener('focus', focusDeck);
  document.addEventListener('visibilitychange', () => { if(!document.hidden) focusDeck(); });
  // Belt-and-suspenders: if a key arrives at the parent, forward it to
  // the iframe by re-dispatching as a KeyboardEvent.
  const FORWARD = new Set(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','PageUp','PageDown','Home','End','f','F',' ']);
  window.addEventListener('keydown', e => {
    if (!FORWARD.has(e.key)) return;
    try {
      const ev = new ifr.contentWindow.KeyboardEvent('keydown', { key: e.key, code: e.code, bubbles: true, cancelable: true });
      ifr.contentWindow.document.dispatchEvent(ev);
      e.preventDefault();
    } catch(err) {}
  });
</script>
</body>
</html>
