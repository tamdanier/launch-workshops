<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HP Inc × Launch by NTT DATA</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="HP Inc × Launch by NTT DATA — Digital Workplace Services pitch.">
<meta property="og:title" content="HP Inc × Launch by NTT DATA">
<meta property="og:description" content="Digital Workplace Services pitch from Launch by NTT DATA.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tamdanierlaunch-artifacts.xyz/hpi/">
<meta name="robots" content="noindex">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow:hidden;background:#111113}
  iframe{display:block;width:100vw;height:100vh;border:0}
  /* ── overlay chrome ────────────────────────────────────────────────── */
  .fs-btn,.sh-btn{position:fixed;top:4.4vh;font-size:.6rem;font-weight:600;
    letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.45);
    background:transparent;border:none;cursor:pointer;z-index:100;padding:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    opacity:.7;transition:opacity .2s,color .2s}
  .fs-btn:hover,.sh-btn:hover{opacity:1;color:#fff}
  .fs-btn{right:5vw}
  .sh-btn{right:calc(5vw + 85px)}
  .toast{position:fixed;bottom:5vh;left:50%;transform:translateX(-50%) translateY(20px);
    background:#111113;color:#f0ede8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:.78rem;font-weight:500;letter-spacing:.04em;padding:.7rem 1.1rem;border-radius:6px;
    border:1px solid #2c2b2b;z-index:110;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  :fullscreen .fs-btn,:fullscreen .sh-btn{display:none !important}
</style>
</head>
<body>
<button class="sh-btn" id="shBtn" title="Copy share link">⇪ SHARE</button>
<button class="fs-btn" id="fsBtn" title="Present (F)">⛶ PRESENT</button>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<iframe id="deck" src="/decks/hpi/" allow="fullscreen; clipboard-write" allowfullscreen></iframe>
<script>
  /* ── presentation mode (fullscreen) ── */
  function toggleFullscreen(){
    if(document.fullscreenElement){document.exitFullscreen()}
    else{document.documentElement.requestFullscreen().catch(err=>console.warn('Fullscreen blocked:',err.message))}
  }
  document.getElementById('fsBtn').addEventListener('click',toggleFullscreen);
  addEventListener('keydown',e=>{if(e.key==='f'||e.key==='F'){e.preventDefault();toggleFullscreen()}});

  /* ── share (copy masked URL) ── */
  const SHARE_URL='https://tamdanierlaunch-artifacts.xyz/hpi/';
  const toast=document.getElementById('toast');
  function showToast(msg){toast.textContent=msg;toast.classList.add('on');clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.classList.remove('on'),2000)}
  document.getElementById('shBtn').addEventListener('click',async()=>{
    try{await navigator.clipboard.writeText(SHARE_URL);showToast('Link copied — '+SHARE_URL.replace(/^https?:\/\//,''))}
    catch(_){
      const ta=document.createElement('textarea');ta.value=SHARE_URL;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');showToast('Link copied — '+SHARE_URL.replace(/^https?:\/\//,''))}
      catch(e2){showToast('Copy failed — '+SHARE_URL)}
      document.body.removeChild(ta);
    }
  });
</script>
</body>
</html>
